# Vardan Logging & Experiment Tracking Configuration

logging:
  version: 1
  disable_existing_loggers: false
  
  formatters:
    standard:
      format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
      datefmt: "%Y-%m-%d %H:%M:%S"
      
  handlers:
    console:
      class: "logging.StreamHandler"
      level: "INFO"
      formatter: "standard"
      stream: "ext://sys.stdout"
      
    file:
      class: "logging.handlers.RotatingFileHandler"
      level: "DEBUG"
      formatter: "standard"
      filename: "experiments/logs/vardan.log"
      maxBytes: 10485760  # 10MB
      backupCount: 5
      encoding: "utf8"
      
  root:
    level: "DEBUG"
    handlers: ["console", "file"]

wandb:
  enabled: false
  project: "vardan-counter-uas"
  entity: "team-53"
  mode: "offline"  # Options: online, offline, disabled
  group: "RF-Baselines"
  tags:
    - "RF"
    - "TinyML"
    - "Multi-modal"

tensorboard:
  enabled: true
  log_dir: "experiments/runs"
